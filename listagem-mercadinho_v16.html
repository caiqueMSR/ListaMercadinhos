<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ListaMercado</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:#f0f2f0;--surface:#fff;--surface2:#f7f8f7;--bdr:#dde3dd;--bdr2:#c8d0c8;
  --green:#2e7d32;--green-lt:#e8f5e9;--green-md:#4caf50;--green-btn:#388e3c;
  --text:#1a1a1a;--text2:#444;--muted:#777;--faint:#aaa;
  --red:#c62828;--red-lt:#ffebee;--yellow:#f57f17;--yel-lt:#fff8e1;
  --blue:#1565c0;--blue-lt:#e3f2fd;
  --viena:#6a1b9a;--mirella:#bf360c;--montana:#01579b;--flash:#2e7d32;
  --viena-lt:#f3e5f5;--mirella-lt:#fbe9e7;--montana-lt:#e1f5fe;--flash-lt:#e8f5e9;
  --radius:8px;
  --shadow:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:600px;margin:0 auto;font-size:14px;line-height:1.4;}

/* SYNC */
.sync-bar{height:3px;background:var(--green-lt);position:fixed;top:0;left:0;right:0;z-index:200;}
.sync-bar.syncing{background:var(--green-md);animation:pulse 1s infinite;}
.sync-bar.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green-md);display:inline-block;margin-left:6px;vertical-align:middle;}
.sync-dot.offline{background:var(--red);}
.sync-dot.syncing{background:var(--yellow);animation:pulse .8s infinite;}

/* HEADER */
.hdr{background:var(--green);padding:14px 14px 11px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:3px;z-index:50;box-shadow:var(--shadow-md);}
.logo{font-size:17px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px;}
.wk{font-size:11px;font-weight:500;color:rgba(255,255,255,.75);background:rgba(255,255,255,.15);border-radius:20px;padding:3px 9px;display:flex;align-items:center;gap:4px;}

/* TABS */
.tabs{background:var(--surface);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;z-index:40;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:10px 12px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;user-select:none;display:flex;align-items:center;gap:4px;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.tab[data-l="viena"].active{color:var(--viena);border-bottom-color:var(--viena);}
.tab[data-l="mirella"].active{color:var(--mirella);border-bottom-color:var(--mirella);}
.tab[data-l="montana"].active{color:var(--montana);border-bottom-color:var(--montana);}
.tab[data-l="flash"].active{color:var(--flash);border-bottom-color:var(--flash);}
.tab[data-l="compras"].active{color:var(--yellow);border-bottom-color:var(--yellow);}
.tab[data-l="pendentes"].active{color:#e65100;border-bottom-color:#e65100;}
.tab[data-l="estoque"].active{color:var(--blue);border-bottom-color:var(--blue);}
.tab[data-l="hist"].active{color:#5d4037;border-bottom-color:#5d4037;}
.badge{font-size:10px;font-weight:700;background:var(--bdr);color:var(--muted);border-radius:10px;padding:1px 5px;min-width:18px;text-align:center;}
.tab.active .badge{background:var(--green-lt);color:var(--green);}
.tab[data-l="viena"].active .badge{background:var(--viena-lt);color:var(--viena);}
.tab[data-l="mirella"].active .badge{background:var(--mirella-lt);color:var(--mirella);}
.tab[data-l="montana"].active .badge{background:var(--montana-lt);color:var(--montana);}
.tab[data-l="flash"].active .badge{background:var(--flash-lt);color:var(--flash);}

/* MAIN */
.main{padding:12px;}

/* SEARCH — sem re-render ao digitar */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:8px 12px;margin-bottom:10px;box-shadow:var(--shadow);}
.search-icon{font-size:15px;color:var(--muted);flex-shrink:0;}
.search-input{flex:1;border:none;outline:none;font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);background:transparent;}
.search-input::placeholder{color:var(--faint);}
.search-clear{font-size:14px;color:var(--muted);cursor:pointer;padding:2px 4px;}

/* INPUT */
.inp-box{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;}
.inp-top-bar{height:4px;}
.inp-body{padding:12px;}
.inp-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
textarea.chat{width:100%;background:var(--surface2);border:1px solid var(--bdr);border-radius:6px;padding:9px 10px;color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;resize:none;min-height:72px;outline:none;line-height:1.5;transition:border-color .15s;}
textarea.chat:focus{border-color:var(--green-md);box-shadow:0 0 0 3px rgba(76,175,80,.12);}
textarea.chat::placeholder{color:var(--faint);}
.hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.4;}
.hint b{color:var(--green);}
.btn-row{display:flex;gap:6px;margin-top:10px;}
.btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border-radius:6px;border:none;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:filter .12s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn-primary{flex:1;background:var(--green-btn);color:#fff;}
.btn-primary:hover{filter:brightness(1.08);}

/* CATEGORY HEADER — destaque visual */
.cat-section{margin-bottom:14px;}
.cat-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--green-lt);border:1px solid #a5d6a7;border-radius:var(--radius);margin-bottom:6px;}
.cat-icon{font-size:18px;}
.cat-name{font-size:13px;font-weight:700;color:var(--green);flex:1;text-transform:uppercase;letter-spacing:.5px;}
.cat-count{font-size:11px;font-weight:700;color:var(--green);background:#fff;border:1px solid #a5d6a7;border-radius:5px;padding:1px 7px;}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;}
.sec-count{background:var(--surface);border:1px solid var(--bdr);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:600;color:var(--text2);}

/* ITEM CARD */
.icard{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);margin-bottom:5px;box-shadow:var(--shadow);animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
.icat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.iinfo{flex:1;min-width:0;}
.iname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.icat-label{font-size:11px;color:var(--muted);margin-top:1px;}
.iqty{font-size:17px;font-weight:700;flex-shrink:0;white-space:nowrap;}
.iunit{font-size:11px;color:var(--muted);font-weight:400;}
.btn-edit{width:28px;height:28px;border-radius:6px;border:1px solid var(--bdr);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .12s;}
.btn-edit:hover{background:var(--green-lt);color:var(--green);border-color:#a5d6a7;}
.btn-rm{width:28px;height:28px;border-radius:6px;border:1px solid var(--bdr);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .12s;}
.btn-rm:hover{background:var(--red-lt);color:var(--red);border-color:#ffcdd2;}
.btn-limpar-tudo{width:100%;margin-top:10px;padding:11px;border-radius:6px;border:1.5px dashed #ffcdd2;background:var(--red-lt);color:var(--red);font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.btn-limpar-tudo:hover{background:#ffcdd2;border-color:var(--red);}
.btn-wpp-loja{width:100%;margin-top:6px;padding:11px;border-radius:6px;border:none;background:#25d366;color:#fff;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:filter .15s;text-align:center;}
.btn-wpp-loja:hover{filter:brightness(1.08);}

/* EMPTY */
.empty{text-align:center;padding:32px 16px;color:var(--muted);}
.empty-icon{font-size:32px;margin-bottom:8px;}
.empty-text{font-size:13px;line-height:1.5;}

/* PREVIEW */
.preview-box{background:var(--green-lt);border:1px solid #c8e6c9;border-radius:6px;padding:10px;margin-top:10px;}
.preview-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--green);margin-bottom:8px;}
.preview-item{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid #c8e6c9;gap:6px;font-size:13px;}
.preview-item:last-of-type{border-bottom:none;}
.prev-name{flex:1;color:var(--text);}
.prev-qty{font-weight:700;color:var(--green);}
.prev-unit{color:var(--muted);font-size:11px;}
.prev-rm{width:20px;height:20px;border-radius:4px;border:1px solid #a5d6a7;background:#fff;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .12s;}
.prev-rm:hover{background:var(--red-lt);color:var(--red);border-color:#ffcdd2;}
.preview-actions{display:flex;gap:6px;margin-top:8px;}
.btn-confirm{flex:1;padding:8px;background:var(--green-btn);color:#fff;border:none;border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-cancel{padding:8px 12px;background:var(--surface);color:var(--muted);border:1px solid var(--bdr);border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;}

/* ABA COMPRAS (consolidado + check + preço) */
.compras-header{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:11px 13px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.compras-header-left strong{display:block;font-size:14px;font-weight:700;color:var(--text);}
.compras-header-left span{font-size:12px;color:var(--muted);}
.btn-atualizar{display:flex;align-items:center;gap:5px;padding:8px 13px;background:var(--green-btn);color:#fff;border:none;border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;transition:filter .12s,transform .1s;}
.btn-atualizar:hover{filter:brightness(1.08);}
.btn-atualizar:active{transform:scale(.96);}
.progress-bar{height:5px;background:var(--bdr);border-radius:3px;margin-bottom:10px;overflow:hidden;}
.progress-fill{height:100%;background:var(--yellow);border-radius:3px;transition:width .35s ease;}
.total-box{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:10px 13px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.total-label{font-size:12px;color:var(--muted);font-weight:600;}
.total-val{font-size:22px;font-weight:700;color:var(--green);}

/* COMPRAS ITEM — check + lojas + preço na mesma linha */
.citem{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:10px 12px;margin-bottom:5px;box-shadow:var(--shadow);animation:fadeIn .18s ease;}
.citem.got{background:var(--green-lt);border-color:#a5d6a7;}
.citem.pending{background:var(--yel-lt);border-color:#ffe082;}
.citem-top{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--bdr2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff;transition:all .15s;}
.citem.got .check-circle{background:var(--green-btn);border-color:var(--green-btn);}
.citem.pending .check-circle{background:var(--yellow);border-color:var(--yellow);}
.citem-name{font-size:14px;font-weight:500;flex:1;transition:color .15s;}
.citem.got .citem-name{text-decoration:line-through;color:var(--muted);}
.citem.pending .citem-name{color:var(--yellow);font-weight:600;}
.citem-total{font-size:15px;font-weight:700;color:var(--yellow);flex-shrink:0;}
.citem.got .citem-total{color:var(--muted);}
.citem.pending .citem-total{color:var(--yellow);}
.citem-unit{font-size:11px;color:var(--muted);}
.pendentes-banner{background:var(--yel-lt);border:1.5px solid #ffe082;border-radius:var(--radius);padding:14px;margin-top:10px;}
.pendentes-title{font-size:13px;font-weight:700;color:var(--yellow);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pendentes-item{font-size:13px;padding:4px 0;border-bottom:1px solid #ffe082;display:flex;justify-content:space-between;}
.pendentes-item:last-child{border-bottom:none;}
.btn-copiar-pendentes{font-size:12px;font-weight:700;color:var(--yellow);background:transparent;border:1.5px solid var(--yellow);border-radius:6px;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-copiar-pendentes:hover{background:var(--yellow);color:#fff;}

/* Estoque aviso no item de compras */
.btn-pendente{
  width:30px;height:30px;border-radius:6px;
  border:1px solid #ffe082;background:var(--yel-lt);
  color:var(--yellow);font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .12s;
}
.btn-pendente:hover{background:var(--yellow);color:#fff;border-color:var(--yellow);}
.btn-pendente.ativo{background:var(--yellow);color:#fff;border-color:var(--yellow);}

/* ABA PENDENTES */
.pend-header{background:#fff3e0;border:1.5px solid #ffcc02;border-radius:var(--radius);padding:12px 13px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.pend-header-left strong{display:block;font-size:14px;font-weight:700;color:#e65100;}
.pend-header-left span{font-size:12px;color:var(--muted);}
.btn-limpar-pendentes{padding:8px 12px;background:#e65100;color:#fff;border:none;border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.pend-item{background:var(--surface);border:1.5px solid #ffcc02;border-radius:var(--radius);padding:11px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.pend-item-info{flex:1;min-width:0;}
.pend-item-nome{font-size:14px;font-weight:600;color:#e65100;}
.pend-item-cat{font-size:11px;color:var(--muted);margin-top:1px;}
.pend-item-qty{font-size:16px;font-weight:700;color:#e65100;flex-shrink:0;}
.pend-item-unit{font-size:11px;color:var(--muted);}
.btn-despend{width:28px;height:28px;border-radius:6px;border:1px solid var(--bdr);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .12s;}
.btn-despend:hover{background:var(--green-lt);color:var(--green);border-color:#a5d6a7;}
.citem-comprar{font-size:11px;font-weight:700;color:var(--yellow);white-space:nowrap;}
.citem-comprar-zero{color:var(--green);}
.citem.got .estoque-aviso{opacity:.5;}

/* Lojas + preço em linha */
.citem-bottom{display:flex;align-items:center;gap:8px;margin-top:7px;padding-top:7px;border-top:1px solid var(--bdr);flex-wrap:wrap;}
.chips{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.chip{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;border:1px solid;}
.chip[data-l="viena"]{color:var(--viena);border-color:#ce93d8;background:var(--viena-lt);}
.chip[data-l="mirella"]{color:var(--mirella);border-color:#ffab91;background:var(--mirella-lt);}
.chip[data-l="montana"]{color:var(--montana);border-color:#81d4fa;background:var(--montana-lt);}
.chip[data-l="flash"]{color:var(--flash);border-color:#a5d6a7;background:var(--flash-lt);}
.price-inline{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.price-curr{font-size:11px;color:var(--muted);font-weight:600;}
.price-inp{width:65px;padding:4px 6px;border:1px solid var(--bdr);border-radius:5px;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;color:var(--text);background:var(--surface2);outline:none;text-align:right;}
.price-inp:focus{border-color:var(--green-md);}
.price-sub{font-size:12px;font-weight:700;color:var(--green);min-width:55px;text-align:right;}

.done-banner{background:var(--green-lt);border:1px solid #a5d6a7;border-radius:var(--radius);text-align:center;padding:20px;margin-top:8px;font-size:14px;color:var(--green);font-weight:600;}
.btn-salvar-compra{width:100%;padding:12px;margin-top:10px;border-radius:6px;border:none;background:var(--green-btn);color:#fff;font-family:'Inter',system-ui,sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:filter .12s;}
.btn-salvar-compra:hover{filter:brightness(1.08);}
.btn-reset{width:100%;padding:10px;margin-top:6px;border-radius:6px;border:1px dashed var(--bdr2);background:transparent;color:var(--muted);font-family:'Inter',system-ui,sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .12s;}
.btn-reset:hover{border-color:var(--muted);color:var(--text2);background:var(--surface);}
.exp-bar{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr);}
.btn-exp{flex:1;padding:9px;background:var(--surface);color:var(--text2);border:1px solid var(--bdr2);border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;text-align:center;transition:background .12s;}
.btn-exp:hover{background:var(--surface2);}

/* ESTOQUE */
.estoque-header{background:var(--blue-lt);border:1px solid #90caf9;border-radius:var(--radius);padding:11px 13px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.estoque-title{font-size:14px;font-weight:700;color:var(--blue);}
.estoque-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.btn-add-estoque{padding:8px 13px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.estoque-item{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.estoque-info{flex:1;min-width:0;}
.estoque-nome{font-size:14px;font-weight:500;}
.estoque-cat{font-size:11px;color:var(--muted);}
.estoque-qty{font-size:16px;font-weight:700;color:var(--blue);flex-shrink:0;}
.estoque-unit{font-size:11px;color:var(--muted);}
.estoque-controles{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.btn-qty{width:26px;height:26px;border-radius:5px;border:1px solid var(--bdr);background:var(--surface2);color:var(--text2);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.btn-qty:hover{background:var(--blue-lt);border-color:#90caf9;color:var(--blue);}
.qty-display{font-size:15px;font-weight:700;color:var(--blue);min-width:28px;text-align:center;}

/* HISTÓRICO */
.hist-header{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:11px 13px;margin-bottom:10px;box-shadow:var(--shadow);}
.hist-header-title{font-size:14px;font-weight:700;color:#5d4037;}
.hist-header-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.hist-date-group{margin-bottom:16px;}
.hist-date-label{font-size:12px;font-weight:700;color:#5d4037;padding:7px 0 5px;border-bottom:2px solid #d7ccc8;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.hist-date-badge{background:#efebe9;border:1px solid #d7ccc8;border-radius:5px;padding:2px 7px;font-size:10px;color:#5d4037;}
.hist-entry{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:11px 13px;margin-bottom:6px;box-shadow:var(--shadow);}
.hist-entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:8px;}
.hist-loja-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;}
.hist-entry-time{font-size:11px;color:var(--muted);flex:1;}
.hist-entry-total{font-size:16px;font-weight:700;color:var(--green);}
.hist-entry-sub{font-size:12px;color:var(--muted);}
.hist-expand{font-size:11px;color:var(--green);cursor:pointer;margin-top:6px;font-weight:600;display:inline-block;}
.hist-details{margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr);display:none;}
.hist-details.open{display:block;}
.hist-detail-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;border-bottom:1px solid var(--bdr);}
.hist-detail-row:last-child{border-bottom:none;}
.hist-detail-name{flex:1;color:var(--text2);}
.hist-detail-qty{color:var(--muted);margin:0 8px;font-size:11px;}
.hist-detail-price{font-weight:600;color:var(--green);}

/* MODAL EDITAR */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:var(--surface);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:600px;max-height:82vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.15);}
.modal-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{font-size:20px;cursor:pointer;color:var(--muted);line-height:1;}
.modal-field{margin-bottom:12px;}
.modal-field-row{display:flex;gap:10px;margin-bottom:12px;}
.modal-field-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.modal-input{width:100%;padding:9px 11px;border:1px solid var(--bdr);border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .15s;}
.modal-input:focus{border-color:var(--green-md);box-shadow:0 0 0 3px rgba(76,175,80,.1);}
select.modal-input{cursor:pointer;}
.modal-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.modal-cat-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;border:1.5px solid var(--bdr);background:var(--surface2);transition:all .12s;}
.modal-cat-item:hover{border-color:var(--green-md);}
.modal-cat-item.selected{background:var(--green-lt);border-color:#a5d6a7;}
.modal-cat-icon{font-size:16px;}
.modal-cat-name{font-size:12px;font-weight:600;flex:1;}
.modal-cat-check{font-size:12px;color:var(--green);font-weight:700;}
.modal-actions{display:flex;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--bdr);}
.modal-btn-save{flex:1;padding:11px;background:var(--green-btn);color:#fff;border:none;border-radius:8px;font-family:'Inter',system-ui,sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.modal-btn-cancel{padding:11px 16px;background:var(--surface2);color:var(--muted);border:1px solid var(--bdr);border-radius:8px;font-family:'Inter',system-ui,sans-serif;font-size:14px;font-weight:600;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:20px;z-index:999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;box-shadow:var(--shadow-md);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--green-btn);}
.toast.err{background:var(--red);}

/* LOADER */
.ldover{display:none;position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.ldover.show{display:flex;}
.spinner{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--green-btn);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{font-size:14px;font-weight:600;color:var(--text2);}
</style>

// ── BUSCA NO BANCO DE PRODUTOS (votação por maioria) ──
function getCatFromDB(digitado){
  const d=digitado.toLowerCase().trim();
  // 1. Exata
  if(PRODUCT_DB[d])return PRODUCT_DB[d];
  // 2. Nome começa com o digitado — votação
  const starts=Object.entries(PRODUCT_DB).filter(([n])=>n.startsWith(d+' ')||n===d);
  if(starts.length){
    const cnt={};starts.forEach(([,c])=>cnt[c]=(cnt[c]||0)+1);
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
  }
  // 3. Digitado contido em nome — votação por maioria
  const contains=Object.entries(PRODUCT_DB).filter(([n])=>n.includes(d));
  if(contains.length){
    const cnt={};contains.forEach(([,c])=>cnt[c]=(cnt[c]||0)+1);
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
  }
  // 4. Por palavras — votação
  const palavras=d.split(/\s+/).filter(p=>p.length>3);
  if(palavras.length){
    const scored=[];
    Object.entries(PRODUCT_DB).forEach(([n,c])=>{
      const score=palavras.reduce((a,p)=>a+(n.includes(p)?1:0),0);
      if(score>0)scored.push([score,c]);
    });
    if(scored.length){
      const best=Math.max(...scored.map(([s])=>s));
      const cnt={};scored.filter(([s])=>s===best).forEach(([,c])=>cnt[c]=(cnt[c]||0)+1);
      return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
    }
  }
  return 'Mercearia';
}

// ── PARSER ──
const UNITS=["kg","g","ml","l","lt","cx","pct","dz","un","gr","lata","pacote","caixa","duzia","garrafa","litro","litros"];
function parseQty(t){return parseFloat(t.replace(',','.'))||0;}
function parseUnit(t){
  const l=t.toLowerCase().replace('.','');
  const m={lt:'L',litro:'L',litros:'L',l:'L',gr:'g',grama:'g',gramas:'g',pacote:'pct',caixa:'cx',duzia:'dz',garrafa:'un',lata:'un'};
  return m[l]||(UNITS.includes(l)?l:null);
}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1).toLowerCase();}
function normalizeName(raw){
  // Preserva o nome exato — só capitaliza primeira letra de cada palavra
  return raw.trim().split(' ').filter(Boolean).map((w,i)=>i===0?capitalize(w):w).join(' ');
}
function parseList(text){
  const results=[];
  const chunks=text.split(/[,;\n]+/).map(c=>c.trim()).filter(Boolean);
  for(const chunk of chunks){
    const tokens=chunk.trim().split(/\s+/);
    let qty=1,unit='un',nameParts=[],i=0;
    if(tokens[0]&&/^\d+[,.]?\d*$/.test(tokens[0])){
      qty=parseQty(tokens[0]);i=1;
      if(tokens[1]){const u=parseUnit(tokens[1]);if(u){unit=u;i=2;}}
      nameParts=tokens.slice(i);
    }else{
      let qi=-1;
      for(let j=tokens.length-1;j>=0;j--){if(/^\d+[,.]?\d*$/.test(tokens[j])){qi=j;break;}}
      if(qi>=0){
        qty=parseQty(tokens[qi]);
        let ai=qi+1;
        if(tokens[ai]){const u=parseUnit(tokens[ai]);if(u){unit=u;ai++;}}
        const s=tokens[qi].match(/^(\d+[,.]?\d*)(kg|g|ml|l|lt|un|cx|pct|gr)$/i);
        if(s){qty=parseQty(s[1]);unit=parseUnit(s[2])||s[2];}
        nameParts=[...tokens.slice(0,qi),...tokens.slice(ai)];
      }else{
        const si=tokens.findIndex(t=>/^\d+[,.]?\d*(kg|g|ml|l|lt|un|cx|pct|gr)$/i.test(t));
        if(si>=0){const s=tokens[si].match(/^(\d+[,.]?\d*)(kg|g|ml|l|lt|un|cx|pct|gr)$/i);qty=parseQty(s[1]);unit=parseUnit(s[2])||s[2];nameParts=tokens.filter((_,j)=>j!==si);}
        else nameParts=tokens;
      }
    }
    const rawName=nameParts.join(' ').replace(/^-+|-+$/g,'').trim();
    if(!rawName||rawName.length<2)continue;
    // Preserva o nome como digitado, só capitaliza primeira letra
    const nome=normalizeName(rawName);
    if(!nome||nome.length<2)continue;
    results.push({nome,qtd:qty||1,unidade:unit});
  }
  return results;
}

// ── CONSOLIDAÇÃO ──
function consolidarLocalmente(){
  const todos=[];
  LOJAS.forEach(l=>estado[l].forEach(item=>todos.push({...item,loja:l})));
  if(!todos.length)return[];
  const grupos={};
  todos.forEach(item=>{
    const key=item.nome.toLowerCase().trim()+'|'+item.unidade;
    if(!grupos[key])grupos[key]={nome:item.nome,categoria:item.categoria||'Mercearia',unidade:item.unidade,total:0,lojas:{viena:0,mirella:0,montana:0,flash:0}};
    grupos[key].total+=item.qtd;
    grupos[key].lojas[item.loja]=(grupos[key].lojas[item.loja]||0)+item.qtd;
  });
  const catOrder=Object.keys(CATS);
  return Object.values(grupos).sort((a,b)=>{
    const ci=catOrder.indexOf(a.categoria)-catOrder.indexOf(b.categoria);
    return ci!==0?ci:a.nome.localeCompare(b.nome,'pt-BR');
  });
}

function sortItems(items){
  const catOrder=Object.keys(CATS);
  return[...items].sort((a,b)=>{
    const ci=catOrder.indexOf(a.categoria||'Mercearia')-catOrder.indexOf(b.categoria||'Mercearia');
    return ci!==0?ci:a.nome.localeCompare(b.nome,'pt-BR');
  });
}

// ── SYNC STATUS ──
function setSyncStatus(s){
  const bar=document.getElementById('syncBar');
  const dot=document.getElementById('syncDot');
  if(!bar||!dot)return;
  bar.className='sync-bar '+(s==='syncing'?'syncing':s==='error'?'error':'');
  dot.className='sync-dot '+(s==='syncing'?'syncing':s==='error'?'offline':'');
}

// ── FIREBASE SAVE ──
let saveTimer=null;
function salvar(immediate=false){
  if(saveTimer)clearTimeout(saveTimer);
  if(immediate){_doSave();}else{saveTimer=setTimeout(_doSave,500);}
}
async function _doSave(){
  if(isSaving)return;
  isSaving=true;setSyncStatus('syncing');
  try{
    await setDoc(DOC,{estado,consolidado,checklist,draftTexts,historico,estoque,updatedAt:Date.now()});
    setSyncStatus('ok');
  }catch(e){
    console.error(e);setSyncStatus('error');
    try{localStorage.setItem('lm6_bk',JSON.stringify({estado,consolidado,checklist,draftTexts,historico,estoque}));}catch(_){}
  }finally{isSaving=false;}
}

function iniciarSync(){
  setSyncStatus('syncing');showLoader(true);
  onSnapshot(DOC,(snap)=>{
    showLoader(false);
    if(snap.exists()){
      const d=snap.data();
      LOJAS.forEach(l=>{
        if(Array.isArray(d.estado?.[l]))estado[l]=d.estado[l];
        if(typeof d.draftTexts?.[l]==='string')draftTexts[l]=d.draftTexts[l];
      });
      if(Array.isArray(d.consolidado))consolidado=d.consolidado;
      if(d.checklist&&typeof d.checklist==='object')checklist=d.checklist;
      if(Array.isArray(d.historico))historico=d.historico;
      if(Array.isArray(d.estoque))estoque=d.estoque;
    }
    setSyncStatus('ok');updateBadges();render();
  },(err)=>{
    console.error(err);setSyncStatus('error');showLoader(false);
    try{
      const s=localStorage.getItem('lm6_bk');
      if(s){const d=JSON.parse(s);LOJAS.forEach(l=>{if(Array.isArray(d.estado?.[l]))estado[l]=d.estado[l];});if(Array.isArray(d.consolidado))consolidado=d.consolidado;if(d.checklist)checklist=d.checklist;if(Array.isArray(d.historico))historico=d.historico;if(Array.isArray(d.estoque))estoque=d.estoque;}
    }catch(_){}
    updateBadges();render();
  });
}

// ── TABS ──
function goTab(l){
  if(LOJAS.includes(aba)){const el=document.getElementById('chatInput');if(el)draftTexts[aba]=el.value;}
  if(previewItems.length&&LOJAS.includes(aba))autoConfirmarPreview(aba);
  aba=l;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.l===l));
  render();
}
function autoConfirmarPreview(loja){
  previewItems.forEach(item=>{
    const idx=estado[loja].findIndex(e=>e.nome.toLowerCase().trim()===item.nome.toLowerCase().trim()&&e.unidade===item.unidade);
    if(idx>=0)estado[loja][idx].qtd+=item.qtd;
    else estado[loja].push({...item});
  });
  previewItems=[];salvar();updateBadges();
}
function updateBadges(){
  LOJAS.forEach(l=>{const el=document.getElementById('n-'+l);if(el)el.textContent=estado[l].length;});
}

// ── RENDER ──
function render(){
  const m=document.getElementById('main');if(!m)return;
  if(aba==='compras'){renderCompras(m);return;}
  if(aba==='pendentes'){renderPendentes(m);return;}
  if(aba==='estoque'){renderEstoque(m);return;}
  if(aba==='hist'){renderHist(m);return;}
  renderLoja(m,aba);
}

        </div>`;
      });
      html+=`</div>`;
    });
  }
  html+=`</div>`;
  if(allItems.length>0)html+=`
  <button class="btn-limpar-tudo" onclick="limparLoja('${loja}')">🗑 Limpar lista toda (${allItems.length} ${allItems.length===1?'item':'itens'})</button>
  <button class="btn-wpp-loja" onclick="exportarLojaWhatsApp('${loja}')">📱 Enviar lista ${LNOMES[loja]} por WhatsApp</button>`;

  m.innerHTML=html;
  const ta=document.getElementById('chatInput');
  if(ta&&draftTexts[loja])ta.value=draftTexts[loja];
  if(previewItems.length)bindPreviewRm();
}

// ── RENDER COMPRAS (consolidado + check + preço) ──
function renderCompras(m){
  const total=LOJAS.reduce((a,l)=>a+estado[l].length,0);
  const done=consolidado.filter((_,i)=>checklist[i]?.status==='got').length;
  const pct=consolidado.length?Math.round(done/consolidado.length*100):0;
  let totalGasto=0;
  consolidado.forEach((_,i)=>{const p=checklist[i]?.preco||0;totalGasto+=p*consolidado[i].total;});

  const q=document.getElementById('search-compras')?.value||'';

  let html=`
  <div class="compras-header">
    <div class="compras-header-left">
      <strong>🛒 Compras</strong>
      <span>${LOJAS.filter(l=>estado[l].length>0).length} loja(s) · ${total} itens cadastrados</span>
    </div>
    <button class="btn-atualizar" onclick="gerarConsolidado()">↻ Atualizar</button>
  </div>`;

  if(!consolidado.length&&total===0){
    m.innerHTML=html+`<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Adicione itens nas lojas primeiro,<br>depois clique em Atualizar.</div></div>`;
    return;
  }
  if(!consolidado.length){
    m.innerHTML=html+`<div class="empty"><div class="empty-icon">⚡</div><div class="empty-text">Clique em <b>↻ Atualizar</b> para gerar<br>a lista consolidada.</div></div>`;
    return;
  }

  html+=`
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:${pct}%"></div></div>
  <div class="total-box">
    <div class="total-label">💰 Total estimado:</div>
    <div class="total-val" id="total-val">R$ ${totalGasto.toFixed(2).replace('.',',')}</div>
  </div>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input id="search-compras" class="search-input" type="text" placeholder="Pesquisar produto..." value="${q}" oninput="filtrarCompras(this.value)">
    ${q?`<span class="search-clear" onclick="limparBuscaCompras()">✕</span>`:''}
  </div>`;

  const filtered=q?consolidado.filter(it=>it.nome.toLowerCase().includes(q.toLowerCase())):consolidado;

  if(filtered.length===0){
    html+=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum resultado para "<b>${q}</b>".</div></div>`;
  }else{
    const byCat={};
    filtered.forEach((it,_)=>{
      const realIdx=consolidado.indexOf(it);
      if(!byCat[it.categoria])byCat[it.categoria]=[];
      byCat[it.categoria].push({...it,idx:realIdx});
    });
    const catOrder=Object.keys(CATS);
    Object.keys(byCat).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b)).forEach(cat=>{
      const cd=CATS[cat]||{icon:'🏪'};
      html+=`<div class="cat-section"><div class="cat-header"><div class="cat-icon">${cd.icon}</div><div class="cat-name">${cat}</div><div class="cat-count">${byCat[cat].length}</div></div>`;
      byCat[cat].forEach(it=>{
        const got=checklist[it.idx]?.status==='got';
        const pending=checklist[it.idx]?.status==='pending';
        const preco=checklist[it.idx]?.preco||'';
        const sub=preco&&it.total?(preco*it.total).toFixed(2).replace('.',','):'';
        const chips=LOJAS.filter(l=>it.lojas[l]>0).map(l=>`<div class="chip" data-l="${l}">${LNOMES[l]}: ${it.lojas[l]}</div>`).join('');
        // Palavras genéricas que não devem ser usadas para amarração
        const PALAVRAS_GENERICAS=new Set(['fardo','caixa','pacote','unidade','litro','frasco','garrafa','lata','pote','saco','rolo','par','kit']);

        function norm(s){
          return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
        }
        // Extrair palavras específicas (não genéricas, não muito curtas)
        function palavrasEspecificas(nome){
          return norm(nome).split(/\s+/).filter(p=>p.length>2&&!PALAVRAS_GENERICAS.has(p));
        }
        function encontrarEstoque(it){
          const nomeLista=norm(it.nome);
          const especificas=palavrasEspecificas(it.nome);
          // 1. Exata normalizada
          let found=estoque.find(e=>norm(e.nome)===nomeLista);
          if(found)return found;
          // 2. Palavras específicas — TODAS devem bater (sem palavras genéricas)
          if(especificas.length>=1){
            found=estoque.find(e=>{
              const ne=norm(e.nome);
              const espEstoque=palavrasEspecificas(e.nome);
              // Todas as palavras específicas da lista devem estar no estoque
              return especificas.every(p=>ne.includes(p));
            });
            if(found)return found;
          }
          // 3. Busca simples: nome da lista contido no estoque (sem palavras genéricas)
          if(especificas.length>=2){
            found=estoque.find(e=>{
              const ne=norm(e.nome);
              // Pelo menos 80% das palavras específicas devem bater
              const matches=especificas.filter(p=>ne.includes(p)).length;
              return matches>=Math.ceil(especificas.length*0.8);
            });
            if(found)return found;
          }
          return null;
        }
        const estoqueItem=encontrarEstoque(it);
        const qtdEstoque=estoqueItem?estoqueItem.qtd:0;
        const unEstoque=estoqueItem?estoqueItem.unidade||'un':'un';
        const unLista=it.unidade||'un';
        const mesmaUnidade=norm(unEstoque)===norm(unLista);
        const qtdComprar=mesmaUnidade?Math.max(0,it.total-qtdEstoque):null;
        const temEstoque=qtdEstoque>0;
        html+=`<div class="citem ${got?'got':''}" id="ci-${it.idx}">
          <div class="citem-top" onclick="toggleCheck(${it.idx})">
            <div class="check-circle">${got?'✓':''}</div>
            <div class="citem-name">${it.nome}</div>
            <div style="text-align:right;flex-shrink:0">
              <div><span class="citem-total">${it.total}</span><span class="citem-unit"> ${it.unidade}</span></div>
              ${temEstoque?`<div class="citem-comprar ${qtdComprar===0?'citem-comprar-zero':''}">${mesmaUnidade?(qtdComprar===0?'✓ estoque ok':`comprar: ${qtdComprar}`):'📦 ver estoque'}</div>`:''}
            </div>
            <button class="btn-pendente ${pending?'ativo':''}" onclick="event.stopPropagation();marcarPendente(${it.idx})" title="Marcar como pendente">⚠</button>
          </div>
          ${temEstoque?`<div class="estoque-aviso">📦 Estoque: <b>${qtdEstoque} ${unEstoque}</b>${
            !mesmaUnidade
              ? ` <span style="color:var(--muted);font-size:11px">(unidade diferente — verifique)</span>`
              : qtdComprar===0
                ? ' — <b style="color:var(--green)">não precisa comprar!</b>'
                : `  → comprar apenas <b>${qtdComprar}</b>`
          }</div>`:''}
          <div class="citem-bottom">
            <div class="chips">${chips}</div>
            <div class="price-inline">
              <span class="price-curr">R$</span>
              <input class="price-inp" type="number" step="0.01" min="0" placeholder="0,00"
                value="${preco}" id="pi-${it.idx}"
                onblur="updatePreco(${it.idx},this.value)"
                onchange="updatePreco(${it.idx},this.value)">
              <div class="price-sub" id="sub-${it.idx}">${sub?'= R$ '+sub:''}</div>
            </div>
          </div>
        </div>`;
      });
      html+=`</div>`;
    });
  }

  if(done===consolidado.length&&consolidado.length>0)html+=`<div class="done-banner">🎉 Tudo marcado! Total: R$ ${totalGasto.toFixed(2).replace('.',',')}</div>`;

  // Banner de pendentes
  const pendentes=consolidado.filter((_,i)=>checklist[i]?.status==='pending');
  if(pendentes.length>0){
    html+=`<div class="pendentes-banner">
      <div class="pendentes-title">
        ⚠️ ${pendentes.length} item${pendentes.length!==1?'s':''} pendente${pendentes.length!==1?'s':''}
        <button class="btn-copiar-pendentes" onclick="copiarPendentes()">📋 Copiar lista</button>
      </div>
      ${pendentes.map(it=>`<div class="pendentes-item"><span>${it.nome}</span><span style="color:var(--muted);font-size:11px">${it.total} ${it.unidade}</span></div>`).join('')}
    </div>`;
  }
  html+=`
  <div class="exp-bar">
    <button class="btn-exp" onclick="copiarLista()">📋 Copiar</button>
    <button class="btn-exp" onclick="abrirWhatsApp()">📱 WhatsApp</button>
  </div>
  <button class="btn-salvar-compra" onclick="salvarCompraNoHistorico()">💾 Salvar compra no histórico</button>
  <button class="btn-reset" onclick="resetCheck()">↺ Reiniciar marcações</button>`;

  m.innerHTML=html;
  updateProgresso();
}

// ── RENDER HISTÓRICO ──
function renderHist(m){
  let html=`<div class="hist-header"><div class="hist-header-title">📋 Histórico de Compras</div><div class="hist-header-sub">${historico.length} registro${historico.length!==1?'s':''}</div></div>`;
  if(!historico.length){m.innerHTML=html+`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nenhum histórico ainda.<br>Salve uma compra ou limpe uma lista.</div></div>`;return;}
  const sorted=[...historico].sort((a,b)=>b.dataTs-a.dataTs);
  const porData={};
  sorted.forEach(e=>{const d=new Date(e.dataTs).toLocaleDateString('pt-BR');if(!porData[d])porData[d]=[];porData[d].push(e);});
  Object.entries(porData).forEach(([data,entries])=>{
    const totalDia=entries.reduce((a,e)=>a+(e.total||0),0);
    html+=`<div class="hist-date-group"><div class="hist-date-label">📅 ${data}<span class="hist-date-badge">${entries.length} registro${entries.length!==1?'s':''} · R$ ${totalDia.toFixed(2).replace('.',',')}</span></div>`;
    entries.forEach(entry=>{
      const lc=LCORES[entry.loja]||'var(--green)';
      const lb=LBGS[entry.loja]||'var(--green-lt)';
      const hora=new Date(entry.dataTs).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      html+=`<div class="hist-entry">
        <div class="hist-entry-top">
          <div class="hist-loja-tag" style="color:${lc};background:${lb};border:1px solid ${lc}40">${entry.loja?LNOMES[entry.loja]:entry.tipo==='compra'?'Compra Geral':'Lista'}</div>
          <div class="hist-entry-time">${hora}</div>
          <div class="hist-entry-total">R$ ${(entry.total||0).toFixed(2).replace('.',',')}</div>
        </div>
        <div class="hist-entry-sub">${entry.itens?.length||0} item${(entry.itens?.length||0)!==1?'s':''} · ${entry.tipo==='compra'?'Compra finalizada':'Lista limpa'}</div>
        <span class="hist-expand" onclick="toggleHistDetail('${entry.id}')">▼ Ver itens</span>
        <div class="hist-details" id="hd-${entry.id}">
          ${(entry.itens||[]).map(it=>`<div class="hist-detail-row"><span class="hist-detail-name">${it.nome}</span><span class="hist-detail-qty">${it.qtd||it.total||1} ${it.unidade||'un'}</span><span class="hist-detail-price">${it.preco?'R$ '+(it.preco*(it.qtd||it.total||1)).toFixed(2).replace('.',','):'-'}</span></div>`).join('')}
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  m.innerHTML=html;
}

// ── BUSCA SEM RE-RENDER COMPLETO ──
function filtrarLoja(loja,val){
  // Re-render só a lista de itens, não o textarea
  const ta=document.getElementById('chatInput');
  const draft=ta?ta.value:draftTexts[loja];
  draftTexts[loja]=draft;
  render();
  // Restaurar foco na busca
  requestAnimationFrame(()=>{
    const si=document.getElementById('search-'+loja);
    if(si){si.focus();si.value=val;si.setSelectionRange(val.length,val.length);}
  });
}
function limparBusca(loja){
  render();
  requestAnimationFrame(()=>{const si=document.getElementById('search-'+loja);if(si)si.focus();});
}
function filtrarCompras(val){
  render();
  requestAnimationFrame(()=>{
    const si=document.getElementById('search-compras');
    if(si){si.focus();si.value=val;si.setSelectionRange(val.length,val.length);}
  });
}
function limparBuscaCompras(){render();}
function filtrarEstoque(val){
  render();
  requestAnimationFrame(()=>{
    const si=document.getElementById('search-estoque');
    if(si){si.focus();si.value=val;si.setSelectionRange(val.length,val.length);}

function limparBuscaEstoque(){render();}

// ── AÇÕES LOJA ──
function saveDraft(loja){const el=document.getElementById('chatInput');if(el)draftTexts[loja]=el.value;}
function handleKey(e){if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))processarInput();}

function processarInput(){
  const el=document.getElementById('chatInput');if(!el)return;
  const txt=el.value.trim();
  if(!txt){showToast('Digite algo primeiro.',true);return;}
  const parsed=parseList(txt);
  if(!parsed.length){showToast('Não entendi. Tente novamente.',true);return;}
  // Usar banco de dados para categoria
  parsed.forEach(it=>{it.categoria=getCatFromDB(it.nome);});
  previewItems=parsed;
  render();
  setTimeout(()=>{const pb=document.querySelector('.preview-box');if(pb)pb.scrollIntoView({behavior:'smooth',block:'nearest'});},80);
}

function confirmarPreview(loja){
  if(!previewItems.length)return;
  let novos=0,atualizados=0;
  previewItems.forEach(item=>{
    const idx=estado[loja].findIndex(e=>e.nome.toLowerCase().trim()===item.nome.toLowerCase().trim()&&e.unidade===item.unidade);
    if(idx>=0){estado[loja][idx].qtd+=item.qtd;atualizados++;}
    else{estado[loja].push({...item});novos++;}
  });
  previewItems=[];draftTexts[loja]='';
  salvar(true);updateBadges();render();
  const msg=novos&&atualizados?`✓ ${novos} novo(s) + ${atualizados} atualizado(s)`:novos?`✓ ${novos} adicionado${novos!==1?'s':''}`:` ✓ ${atualizados} atualizado${atualizados!==1?'s':''}`;
  showToast(msg);
}
function cancelarPreview(){previewItems=[];render();}

function remItem(loja,i){estado[loja].splice(i,1);salvar();updateBadges();render();}

function limparLoja(loja){
  if(!estado[loja].length)return;
  if(!confirm(`Limpar lista de ${LNOMES[loja]}? Será salvo no histórico.`))return;
  historico.push({id:'h'+Date.now(),dataTs:Date.now(),loja,tipo:'lista',itens:estado[loja].map(it=>({...it,preco:0})),total:0});
  estado[loja]=[];previewItems=[];
  salvar(true);updateBadges();render();
  showToast('Lista limpa e salva no histórico.');
}

// ── AÇÕES COMPRAS ──
function gerarConsolidado(){
  const total=LOJAS.reduce((a,l)=>a+estado[l].length,0);
  // Se todas as lojas estão vazias, zera o consolidado
  if(!total){
    if(consolidado.length){
      // Verificar se já foi salvo no histórico
      const jaSalvo=historico.some(h=>h.tipo==='compra'&&h.dataTs&&(Date.now()-h.dataTs)<7*24*60*60*1000);
      if(!jaSalvo){
        if(!confirm('Todas as listas estão vazias.\nA lista consolidada atual NÃO foi salva no histórico.\nDeseja zerar mesmo assim?'))return;
      }
      consolidado=[];checklist={};
      salvar(true);render();
      showToast('Consolidado zerado.');
    }else{
      showToast('Adicione itens nas lojas primeiro.',true);
    }
    return;
  }
  consolidado=consolidarLocalmente();checklist={};
  salvar(true);render();
  showToast(`✓ ${consolidado.length} produtos consolidados!`);
}

function toggleCheck(idx){
  if(!checklist[idx])checklist[idx]={status:'',preco:0};
  // Se está pendente, não deixa marcar como comprado direto — avisa
  if(checklist[idx].status==='pending'){
    showToast('Remova dos pendentes primeiro (⚠️).',true);return;
  }
  // 2 estados limpos: '' <-> 'got'
  checklist[idx].status=checklist[idx].status==='got'?'':'got';
  const got=checklist[idx].status==='got';
  const ci=document.getElementById('ci-'+idx);
  if(ci){
    ci.className='citem'+(got?' got':'');
    const circle=ci.querySelector('.check-circle');
    if(circle)circle.textContent=got?'✓':'';
  }
  updateProgresso();
  salvar();
}

function marcarPendente(idx){
  if(!checklist[idx])checklist[idx]={status:'',preco:0};
  const jaPendente=checklist[idx].status==='pending';
  // Ao marcar pendente, remove também o check de comprado
  checklist[idx].status=jaPendente?'':'pending';
  if(aba==='pendentes'){
    // Re-render a aba pendentes
    salvar(true);render();
  } else {
    // Atualizar card visual na aba compras
    const ci=document.getElementById('ci-'+idx);
    if(ci){
      ci.className='citem'; // remove got e pending
      const circle=ci.querySelector('.check-circle');
      if(circle)circle.textContent='';
      const btn=ci.querySelector('.btn-pendente');
      if(btn)btn.classList.toggle('ativo',!jaPendente);
    }
    updateProgresso();
    salvar();
  }
  if(!jaPendente)showToast('⚠️ Movido para Pendentes!');
  else showToast('✓ Removido dos pendentes.');
}

function updatePreco(idx,val){
  if(!checklist[idx])checklist[idx]={status:'',preco:0};
  checklist[idx].preco=parseFloat(val)||0;
  const q=consolidado[idx]?.total||1;
  const p=checklist[idx].preco;
  const sub=document.getElementById('sub-'+idx);
  if(sub)sub.textContent=p?'= R$ '+(p*q).toFixed(2).replace('.',','):'';
  let t=0;
  consolidado.forEach((_,i)=>{const pi=checklist[i]?.preco||0;t+=pi*consolidado[i].total;});
  const tv=document.getElementById('total-val');
  if(tv)tv.textContent='R$ '+t.toFixed(2).replace('.',',');
  clearTimeout(window._pt);window._pt=setTimeout(()=>salvar(),800);
}

function updateBadgePendentes(){
  const count=consolidado.filter((_,i)=>checklist[i]?.status==='pending').length;
  const el=document.getElementById('n-pendentes');
  if(el)el.textContent=count;
}

// ── RENDER PENDENTES ──
function renderPendentes(m){
  const todosPendentes=consolidado.map((it,i)=>({...it,idx:i})).filter(it=>checklist[it.idx]?.status==='pending');
  const q=document.getElementById('search-pendentes')?.value||'';
  const pendentes=q?todosPendentes.filter(it=>it.nome.toLowerCase().includes(q.toLowerCase())):todosPendentes;

  let html=`
  <div class="pend-header">
    <div class="pend-header-left">
      <strong>⚠️ Itens Pendentes</strong>
      <span>${todosPendentes.length} item${todosPendentes.length!==1?'s':''} não comprado${todosPendentes.length!==1?'s':''}</span>
    </div>
    ${todosPendentes.length?`<button class="btn-limpar-pendentes" onclick="copiarPendentes()">📋 Copiar</button>`:''}
  </div>`;

  if(!todosPendentes.length){
    m.innerHTML=html+`<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Nenhum item pendente!<br>Toque em ⚠️ nos itens da aba Compras<br>para enviá-los aqui.</div></div>`;
    return;
  }

  html+=`
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input id="search-pendentes" class="search-input" type="text" placeholder="Pesquisar pendentes..." value="${q}" oninput="filtrarPendentes(this.value)">
    ${q?`<span class="search-clear" onclick="limparBuscaPendentes()">✕</span>`:''}
  </div>`;

  if(pendentes.length===0){
    html+=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum resultado para "<b>${q}</b>".</div></div>`;
  } else {
    const catOrder=Object.keys(CATS);
    const byCat={};
    pendentes.forEach(it=>{if(!byCat[it.categoria])byCat[it.categoria]=[];byCat[it.categoria].push(it);});
    Object.keys(byCat).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b)).forEach(cat=>{
      const cd=CATS[cat]||{icon:'🏪'};
      html+=`<div class="cat-section">
        <div class="cat-header" style="background:#fff3e0;border-color:#ffcc02">
          <div class="cat-icon">${cd.icon}</div>
          <div class="cat-name" style="color:#e65100">${cat}</div>
          <div class="cat-count" style="color:#e65100;border-color:#ffcc02;background:#fff8e1">${byCat[cat].length}</div>
        </div>`;
      byCat[cat].forEach(it=>{
        const chips=LOJAS.filter(l=>it.lojas[l]>0).map(l=>`<div class="chip" data-l="${l}">${LNOMES[l]}: ${it.lojas[l]}</div>`).join('');
        html+=`<div class="pend-item">
          <div class="pend-item-info">
            <div class="pend-item-nome">${it.nome}</div>
            <div class="pend-item-cat">${cd.icon} ${cat}</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px">${chips}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div><span class="pend-item-qty">${it.total}</span><span class="pend-item-unit"> ${it.unidade}</span></div>
          </div>
          <button class="btn-despend" onclick="marcarPendente(${it.idx})" title="Remover dos pendentes — item foi comprado">✓</button>
        </div>`;
      });
      html+=`</div>`;
    });
  }

  html+=`<div class="exp-bar">
    <button class="btn-exp" onclick="copiarPendentes()">📋 Copiar lista</button>
    <button class="btn-exp" onclick="exportarPendentesWhatsApp()">📱 WhatsApp</button>
  </div>`;
  m.innerHTML=html;
}

function updateProgresso(){
  const total=consolidado.length;
  const done=consolidado.filter((_,i)=>checklist[i]?.status==='got').length;
  const pending=consolidado.filter((_,i)=>checklist[i]?.status==='pending').length;
  const pct=total?Math.round(done/total*100):0;
  const pf=document.getElementById('prog-fill');if(pf)pf.style.width=pct+'%';
  updateBadgePendentes();
  if(done===total&&total>0){
    let t=0;consolidado.forEach((_,i)=>{const p=checklist[i]?.preco||0;t+=p*consolidado[i].total;});
    if(!document.querySelector('.done-banner')){
      const btn=document.querySelector('.btn-salvar-compra');
      if(btn){const d=document.createElement('div');d.className='done-banner';d.textContent=`🎉 Tudo comprado! Total: R$ ${t.toFixed(2).replace('.',',')}`;btn.before(d);}
    }
  }
}

function copiarPendentes(){
  const pendentes=consolidado.filter((_,i)=>checklist[i]?.status==='pending');
  if(!pendentes.length){showToast('Nenhum item pendente.',true);return;}
  let txt=`⚠️ LISTA DE PENDENTES — ${getSemana()}\n\n`;
  const byCat={};
  pendentes.forEach(it=>{if(!byCat[it.categoria])byCat[it.categoria]=[];byCat[it.categoria].push(it);});
  const catOrder=Object.keys(CATS);
  Object.keys(byCat).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b)).forEach(cat=>{
    const cd=CATS[cat]||{icon:'🏪'};
    txt+=`${cd.icon} ${cat}\n`;
    byCat[cat].forEach(it=>{txt+=`• ${it.nome} — ${it.total} ${it.unidade}\n`;});
    txt+='\n';
  });
  navigator.clipboard.writeText(txt).then(()=>showToast('✓ Lista de pendentes copiada!')).catch(()=>showToast('Erro ao copiar.',true));
}

function salvarCompraNoHistorico(){
  let t=0;
  const itens=consolidado.map((it,i)=>{
    const p=checklist[i]?.preco||0;
    const s=p*it.total;
    t+=s;
    return{...it,preco:p,subtotal:s,qtd:it.total,status:checklist[i]?.status||''};
  });
  const pendentes=itens.filter(it=>it.status==='pending');
  historico.push({id:'c'+Date.now(),dataTs:Date.now(),loja:null,tipo:'compra',itens,total:t,pendentes:pendentes.length});
  salvar(true);
  const msg=pendentes.length?`✓ Salvo! ${pendentes.length} item${pendentes.length!==1?'s':''} pendente${pendentes.length!==1?'s':''}.`:'✓ Compra salva no histórico!';
  showToast(msg);
}

function resetCheck(){checklist={};salvar();renderCompras(document.getElementById('main'));}

// ── ESTOQUE ──
function abrirAddEstoque(){
  abrirEditarItem(null,null,true);
}
function ajustarEstoque(idx,delta){
  if(idx<0||idx>=estoque.length)return;
  estoque[idx].qtd=Math.max(0,estoque[idx].qtd+delta);
  const el=document.getElementById('eq-'+idx);
  if(el)el.textContent=estoque[idx].qtd;
  salvar();
}
function remEstoque(idx){
  if(!confirm('Remover do estoque?'))return;
  estoque.splice(idx,1);salvar();renderEstoque(document.getElementById('main'));
}

// ── MODAL EDITAR ITEM ──
function abrirEditarItem(loja,idx,isEstoque=false){
  const item=isEstoque?{nome:'',qtd:1,unidade:'un',categoria:'Mercearia'}:(loja?estado[loja][idx]:null);
  if(!item&&!isEstoque)return;
  fecharModal();
  window._catSelecionada=item.categoria||'Mercearia';

  const catGrid=Object.entries(CATS).map(([cat,d])=>`
    <div class="modal-cat-item ${window._catSelecionada===cat?'selected':''}" onclick="selecionarCatModal('${cat}')">
      <div class="modal-cat-icon">${d.icon}</div>
      <div class="modal-cat-name">${cat}</div>
      ${window._catSelecionada===cat?'<span class="modal-cat-check">✓</span>':''}
    </div>`).join('');

  const modal=document.createElement('div');
  modal.className='modal-overlay';modal.id='modalOverlay';
  modal.innerHTML=`<div class="modal-box">
    <div class="modal-title">${isEstoque?'📦 Adicionar ao Estoque':'✎ Editar Item'}<span class="modal-close" onclick="fecharModal()">✕</span></div>
    <div class="modal-field"><div class="modal-field-label">Nome do produto</div><input class="modal-input" id="editNome" type="text" value="${item.nome}" placeholder="Nome do produto"></div>
    <div class="modal-field-row">
      <div class="modal-field" style="flex:1"><div class="modal-field-label">Quantidade</div><input class="modal-input" id="editQtd" type="number" min="0.1" step="0.1" value="${item.qtd}"></div>
      <div class="modal-field" style="flex:1"><div class="modal-field-label">Unidade</div><select class="modal-input" id="editUnit">${['un','kg','g','L','ml','cx','pct','dz'].map(u=>`<option ${item.unidade===u?'selected':''}>${u}</option>`).join('')}</select></div>
    </div>
    <div class="modal-field"><div class="modal-field-label">Categoria</div><div class="modal-cat-grid" id="catGrid">${catGrid}</div></div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="modal-btn-save" onclick="salvarEdicao('${loja}',${idx},${isEstoque})">✓ Salvar</button>
    </div>
  </div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)fecharModal();});
  document.body.appendChild(modal);
}

function selecionarCatModal(cat){
  window._catSelecionada=cat;
  document.querySelectorAll('.modal-cat-item').forEach(el=>{
    const nome=el.querySelector('.modal-cat-name')?.textContent;
    const sel=nome===cat;
    el.classList.toggle('selected',sel);
    const chk=el.querySelector('.modal-cat-check');
    if(chk)chk.remove();
    if(sel){const s=document.createElement('span');s.className='modal-cat-check';s.textContent='✓';el.appendChild(s);}
  });
}

function salvarEdicao(loja,idx,isEstoque){
  const nome=document.getElementById('editNome')?.value.trim();
  const qtd=parseFloat(document.getElementById('editQtd')?.value)||1;
  const unit=document.getElementById('editUnit')?.value||'un';
  const cat=window._catSelecionada||'Mercearia';
  if(!nome){showToast('Nome não pode ser vazio.',true);return;}

  if(isEstoque){
    estoque.push({id:'e'+Date.now(),nome,qtd,unidade:unit,categoria:cat});
  }else{
    estado[loja][idx]={...estado[loja][idx],nome,qtd,unidade:unit,categoria:cat};
  }
  fecharModal();salvar(true);updateBadges();render();
  showToast(isEstoque?'✓ Adicionado ao estoque!':'✓ Item atualizado!');
}

function fecharModal(){const m=document.getElementById('modalOverlay');if(m)m.remove();window._catSelecionada=null;}

// ── HISTÓRICO ──
function toggleHistDetail(id){
  const el=document.getElementById('hd-'+id);if(!el)return;
  el.classList.toggle('open');
  const btn=el.previousElementSibling;
  if(btn)btn.textContent=el.classList.contains('open')?'▲ Fechar':'▼ Ver itens';
}

// ── EXPORTAR ──
function buildTexto(){
  const byCat={};consolidado.forEach(it=>{if(!byCat[it.categoria])byCat[it.categoria]=[];byCat[it.categoria].push(it);});
  const catOrder=Object.keys(CATS);
  const cats=Object.keys(byCat).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b));
  let txt=`📦 LISTA CONSOLIDADA — ${getSemana()}\n\n`;
  cats.forEach(cat=>{
    const cd=CATS[cat]||{icon:'🏪'};
    txt+=`${cd.icon} ${cat.toUpperCase()}\n`;
    byCat[cat].forEach(it=>{const bd=LOJAS.filter(l=>it.lojas[l]>0).map(l=>`${LNOMES[l]}:${it.lojas[l]}`).join(' | ');txt+=`• ${it.nome} — ${it.total} ${it.unidade}  (${bd})\n`;});
    txt+='\n';
  });
  return txt;
}
function copiarLista(){navigator.clipboard.writeText(buildTexto()).then(()=>showToast('✓ Lista copiada!')).catch(()=>showToast('Erro.',true));}
function abrirWhatsApp(){
  const byCat={};consolidado.forEach(it=>{if(!byCat[it.categoria])byCat[it.categoria]=[];byCat[it.categoria].push(it);});
  const catOrder=Object.keys(CATS);
  let txt=`📦 *LISTA CONSOLIDADA* — ${getSemana()}\n\n`;
  Object.keys(byCat).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b)).forEach(cat=>{
    const cd=CATS[cat]||{icon:'🏪'};txt+=`${cd.icon} *${cat}*\n`;
    byCat[cat].forEach(it=>{const bd=LOJAS.filter(l=>it.lojas[l]>0).map(l=>`${LNOMES[l]}: ${it.lojas[l]}`).join(' · ');txt+=`• ${it.nome}: *${it.total} ${it.unidade}*\n  _(${bd})_\n`;});
    txt+='\n';
  });
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

// ── UTILS ──
function getSemana(){const now=new Date();const j=new Date(now.getFullYear(),0,1);return`Semana ${Math.ceil((((now-j)/86400000)+j.getDay()+1)/7)}/${now.getFullYear()}`;}
function showToast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(err?'err':'ok');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function showLoader(show){document.getElementById('loader').classList.toggle('show',show);}

function exportarLojaWhatsApp(loja){
  const items=sortItems(estado[loja]);
  if(!items.length){showToast('Lista vazia.',true);return;}
  const byCat={};
  items.forEach(it=>{const cat=it.categoria||'Mercearia';if(!byCat[cat])byCat[cat]=[];byCat[cat].push(it);});
  const catOrder=Object.keys(CATS);
  let txt=`🛒 *Lista ${LNOMES[loja]}* — ${getSemana()}\n\n`;
  Object.keys(byCat).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b)).forEach(cat=>{
    const cd=CATS[cat]||{icon:'🏪'};
    txt+=`${cd.icon} *${cat}*\n`;
    byCat[cat].forEach(it=>{txt+=`• ${it.nome}: *${it.qtd} ${it.unidade||'un'}*\n`;});
    txt+='\n';
  });
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

function exportarPendentesWhatsApp(){
  const pendentes=consolidado.filter((_,i)=>checklist[i]?.status==='pending');
  if(!pendentes.length){showToast('Nenhum item pendente.',true);return;}
  const catOrder=Object.keys(CATS);
  const byCat={};
  pendentes.forEach(it=>{if(!byCat[it.categoria])byCat[it.categoria]=[];byCat[it.categoria].push(it);});
  let txt=`⚠️ *LISTA DE PENDENTES* — ${getSemana()}\n\n`;
  Object.keys(byCat).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b)).forEach(cat=>{
    const cd=CATS[cat]||{icon:'🏪'};
    txt+=`${cd.icon} *${cat}*\n`;
    byCat[cat].forEach(it=>{
      const bd=LOJAS.filter(l=>it.lojas[l]>0).map(l=>`${LNOMES[l]}: ${it.lojas[l]}`).join(' · ');
      txt+=`• ${it.nome}: *${it.total} ${it.unidade}* _(${bd})_\n`;
    });
    txt+='\n';
  });
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

function filtrarPendentes(val){
  render();
  requestAnimationFrame(()=>{
    const si=document.getElementById('search-pendentes');
    if(si){si.focus();si.value=val;si.setSelectionRange(val.length,val.length);}
  });
}
function limparBuscaPendentes(){render();}
